<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1170 2532">
  <defs>
    <linearGradient id="sbg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>
  </defs>
  <rect width="1170" height="2532" fill="url(#sbg)"/>
  <!-- Scattered sparkles -->
  <text x="180" y="600" font-size="48" fill="#fff" opacity="0.15">✦</text>
  <text x="900" y="500" font-size="36" fill="#fbbf24" opacity="0.2">✦</text>
  <text x="300" y="1900" font-size="40" fill="#fff" opacity="0.12">✦</text>
  <text x="850" y="2000" font-size="32" fill="#fbbf24" opacity="0.18">✦</text>
  <text x="150" y="1200" font-size="28" fill="#fff" opacity="0.1">✦</text>
  <text x="1000" y="1300" font-size="44" fill="#fff" opacity="0.12">✦</text>
  <!-- Kawaii card (centered) -->
  <g transform="translate(585,1100)">
    <rect x="-120" y="-160" width="240" height="320" rx="22" fill="#fff" stroke="#e0d4f5" stroke-width="3"/>
    <!-- Eyes -->
    <circle cx="-36" cy="-16" r="16" fill="#1a1a2e"/>
    <circle cx="36" cy="-16" r="16" fill="#1a1a2e"/>
    <circle cx="-36" cy="-20" r="6" fill="#fff"/>
    <circle cx="36" cy="-20" r="6" fill="#fff"/>
    <!-- Blush -->
    <ellipse cx="-60" cy="14" rx="18" ry="10" fill="#c4b5fd" opacity="0.45"/>
    <ellipse cx="60" cy="14" rx="18" ry="10" fill="#c4b5fd" opacity="0.45"/>
    <!-- Happy mouth -->
    <path d="M-20,30 Q0,52 20,30" fill="none" stroke="#1a1a2e" stroke-width="5" stroke-linecap="round"/>
    <!-- Suit symbols -->
    <text x="-90" y="-100" font-size="44" fill="#e74c6f" font-family="serif">♥</text>
    <text x="58" y="138" font-size="44" fill="#1a1a2e" font-family="serif">♠</text>
  </g>
  <!-- Title -->
  <text x="585" y="1440" text-anchor="middle" font-family="'Nunito',sans-serif" font-weight="900" font-size="88" fill="#fff" letter-spacing="2">
    TINY TINY
  </text>
  <text x="585" y="1540" text-anchor="middle" font-family="'Nunito',sans-serif" font-weight="800" font-size="68" fill="#fbbf24" letter-spacing="3">
    GAMES
  </text>
  <text x="585" y="1610" text-anchor="middle" font-family="'Nunito',sans-serif" font-weight="600" font-size="36" fill="rgba(255,255,255,0.5)">
    Card games and more!
  </text>
</svg>
